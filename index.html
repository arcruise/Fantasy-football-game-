<!DOCTYPE html>
<html>
<head>
<title>DLS 2026 v2.0 NIGHT EDITION</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a3d0a;color:#fff;font-family:Arial;overflow:hidden}
#canvas{background:#0db40d;display:none}
.menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#000e;padding:40px;border-radius:20px;text-align:center}
button{padding:15px 30px;margin:10px;background:#ffaa00;border:0;border-radius:10px;font-weight:900;font-size:18px;cursor:pointer}
.bot{background:#00d400}
#hud{position:absolute;top:10px;width:100%;text-align:center;font-size:26px;font-weight:900;background:#0007;padding:8px}
#power{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);width:200px;height:10px;background:#333;border-radius:5px;display:none}
#power div{height:100%;background:#ff0000;border-radius:5px;width:0%}

/* MOBILE CONTROLS */
.btn{position:absolute;width:60px;height:60px;background:#fff3;border-radius:50%;font-size:20px;font-weight:900;color:#fff;border:2px solid #fff;display:none}
#up{bottom:150px;left:50px} #down{bottom:30px;left:50px} #left{bottom:90px;left:10px} #right{bottom:90px;left:90px}
#shoot{bottom:90px;right:30px;background:#ff0000} #pass{bottom:90px;right:100px;background:#00aaff} #sprint{bottom:150px;right:30px;background:#ffff00;color:#000}
</style>
</head>
<body>
<h1 style="text-align:center;padding:10px">🏆 DLS 2026 v2.0 🏆</h1>
<div id="hud">0 - 0 | 45:00</div>

<div class="menu" id="menu">
<button class="bot" onclick="start()">PLAY NOW</button>
<p style="margin-top:15px">PC: WASD Move | SPACE Shoot | E Pass | F Tackle | TAB Switch</p>
</div>

<canvas id="canvas" width="1200" height="700"></canvas>
<div id="power"><div></div></div>

<!-- MOBILE BUTTONS -->
<button class="btn" id="up">↑</button><button class="btn" id="down">↓</button>
<button class="btn" id="left">←</button><button class="btn" id="right">→</button>
<button class="btn" id="shoot">S</button><button class="btn" id="pass">P</button><button class="btn" id="sprint">R</button>

<audio id="kick" src="https://www.soundjay.com/mechanical/sounds/soccer-kick-1.mp3"></audio>
<audio id="goal" src="https://www.soundjay.com/human/sounds/crowd-cheer-1.mp3"></audio>

<script>
const c=document.getElementById('canvas'),x=c.getContext('2d');
let k={},game=0,ball={x:600,y:350,vx:0,vy:0},t1=[],t2=[],sc=[0,0],pow=0,charge=0,me=4,clock=2700;

function teams(){t1=[];t2=[];let pos=[[70,350],[170,110],[170,230],[170,350],[170,470],[170,590],[300,180],[300,300],[300,420],[300,540],[480,250],[480,450]];
pos.forEach((v,i)=>{t1.push({x:v[0],y:v[1],ox:v[0],oy:v[1],c:'#0055ff',n:i+1});t2.push({x:1200-v[0],y:v[1],ox:1200-v[0],oy:v[1],c:'#ff0000',n:i+1})})}

function pitch(){x.fillStyle='#0db40d';x.fillRect(0,0,1200,700);x.strokeStyle='#fff';x.lineWidth=3;x.strokeRect(0,0,1200,700);
x.beginPath();x.moveTo(600,0);x.lineTo(600,700);x.stroke();x.beginPath();x.arc(600,350,90,0,7);x.stroke();
x.fillRect(0,230,120,240);x.fillRect(1080,230,120,240);x.fillRect(0,280,60,140);x.fillRect(1140,280,60,140);x.fillRect(0,310,18,80);x.fillRect(1182,310,18,80)}

function draw(){pitch();[...t1,...t2].forEach((pl,i)=>{let is=(i===me)||(i===me+12);
x.fillStyle=pl.c;x.beginPath();x.arc(pl.x,pl.y,14,0,7);x.fill(); // Body
x.fillStyle='#fff';x.font='bold 10px Arial';x.fillText(pl.n,pl.x-4,pl.y+3); // Number
if(is){x.strokeStyle='yellow';x.lineWidth=3;x.stroke()}});
x.fillStyle='#fff';x.beginPath();x.arc(ball.x,ball.y,7,0,7);x.fill()}

function ai(){t2.forEach(pl=>{let d=Math.hypot(ball.x-pl.x,ball.y-pl.y);
if(d<250){if(pl.x<ball.x)pl.x+=2.5;if(pl.y<ball.y)pl.y+=2.5;if(pl.x>ball.x)pl.x-=2.5;if(pl.y>ball.y)pl.y-=2.5;}
else{if(pl.x<pl.ox)pl.x+=1;if(pl.x>pl.ox)pl.x-=1;if(pl.y<pl.oy)pl.y+=1;if(pl.y>pl.oy)pl.y-=1;}})}
function collide(a,b){let d=Math.hypot(a.x-b.x,a.y-b.y);if(d<28){let ang=Math.atan2(b.y-a.y,b.x-a.x);a.x-=Math.cos(ang)*2;b.x+=Math.cos(ang)*2}}

function loop(){if(!game)return;draw();ai();
let ply=t1[me];let spd=k['Shift']||k['sprint']?8:5;
if(k['w']||k['up'])ply.y-=spd;if(k['s']||k['down'])ply.y+=spd;if(k['a']||k['left'])ply.x-=spd;if(k['d']||k['right'])ply.x+=spd;
ply.x=Math.max(20,Math.min(1180,ply.x));ply.y=Math.max(20,Math.min(680,ply.y));
[...t1,...t2].forEach((p1,i)=>[...t1,...t2].forEach((p2,j)=>{if(i<j)collide(p1,p2)}))

if(charge){pow+=3.5;if(pow>100)pow=100;document.querySelector('#power div').style.width=pow+'%'}

ball.x+=ball.vx;ball.y+=ball.vy;ball.vx*=0.985;ball.vy*=0.985;
if(ball.x<18&&ball.y>310&&ball.y<390){sc[1]++;document.getElementById('goal').play();reset()}
if(ball.x>1182&&ball.y>310&&ball.y<390){sc[0]++;document.getElementById('goal').play();reset()}

clock--;let m=Math.floor(clock/60),s=clock%60;
document.getElementById('hud').innerText=`${sc[0]} - ${sc[1]} | ${m}:${s<10?'0':''}${s}`;
if(clock<=0)game=0;requestAnimationFrame(loop)}
function reset(){ball={x:600,y:350,vx:0,vy:0};teams()}

function shoot(dx,dy){let ply=t1[me];ball.x=ply.x+dx*16;ball.y=ply.y+dy*16;ball.vx=dx*pow/5.5;ball.vy=dy*pow/5.5;pow=0;document.getElementById('kick').play()}
function pass(){let ply=t1[me];let tar=t1.filter((_,i)=>i!==me).reduce((a,b)=>Math.hypot(a.x-ply.x,a.y-ply.y)<Math.hypot(b.x-ply.x,b.y-ply.y)?a:b);
ball.vx=(tar.x-ply.x)/14;ball.vy=(tar.y-ply.y)/14}
function tackle(){let ply=t1[me];if(Math.hypot(ball.x-ply.x,ball.y-ply.y)<25){ball.vx=ball.vy=0;ball.x=ply.x;ball.y=ply.y}}
function switchP(){me=(me+1)%12}

onkeydown=e=>{k[e.key]=1;if(e.key===' '){charge=1;document.getElementById('power').style.display='block'}}
onkeyup=e=>{k[e.key]=0;if(e.key===' '){charge=0;document.getElementById('power').style.display='none';let dx=k['d']?1:k['a']?-1:1;let dy=k['s']?1:k['w']?-1:0;shoot(dx,dy)}
if(e.key==='e')pass();if(e.key==='f')tackle();if(e.key==='Tab'){e.preventDefault();switchP()}}

// MOBILE TOUCH
['up','down','left','right','shoot','pass','sprint'].forEach(id=>{
document.getElementById(id).ontouchstart=()=>k[id]=1;
document.getElementById(id).ontouchend=()=>{k[id]=0;if(id==='shoot'){let dx=k['right']?1:k['left']?-1:1;let dy=k['down']?1:k['up']?-1:0;shoot(dx,dy)}if(id==='pass')pass()}
})

function start(){game=1;teams();document.getElementById('menu').style.display='none';c.style.display='block';document.querySelectorAll('.btn').forEach(b=>b.style.display='block');loop()}
</script>
</body>
</html>
