<!DOCTYPE html>
<html>
<head>
<title>DLS 2026 v4.0 REAL GRAPHICS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden;font-family:Arial}
#canvas{background:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700"><rect fill="%230d8a0d" width="1200" height="700"/><path stroke="%23fff" stroke-width="3" fill="none" d="M0 0h1200v700H0zM600 0v700M600 350m-80 0a80 80 0 1 1 160 0 80 80 0 1 1 -160 0M0 250h100v200H0zM1100 250h100v200h-100z"/></svg>')}
.menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#000e;padding:30px;border-radius:15px;color:#fff;text-align:center;z-index:100}
button{padding:15px 30px;background:#ffaa00;border:0;border-radius:10px;font-weight:900;font-size:18px}
#hud{position:absolute;top:10px;width:100%;text-align:center;font-size:28px;color:#fff;font-weight:900;text-shadow:2px 2px 4px #000}

/* DLS MOBILE CONTROLS */
.btn{position:absolute;width:65px;height:65px;border-radius:50%;background:#ffffff20;border:2px solid #fff;color:#fff;font-weight:900;display:none;font-size:12px}
#shoot{bottom:100px;right:40px;background:#ff2222;width:80px;height:80px}
#pass{bottom:100px;right:140px;background:#2299ff}
#sprint{bottom:170px;right:40px;background:#ffff00;color:#000}
.dpad{position:absolute;bottom:30px;left:30px;width:150px;height:150px}
.dir{position:absolute;width:45px;height:45px;background:#ffffff20;border:2px solid #fff;border-radius:10px;color:#fff;font-size:20px}
#up{top:0;left:52px} #down{bottom:0;left:52px} #left{top:52px;left:0} #right{top:52px;right:0}
</style>
</head>
<body>
<div id="hud">0 - 0 | 45:00</div>
<div class="menu" id="menu"><h2>🏆 DLS 2026 v4.0 🏆</h2><p>REAL PLAYER GRAPHICS</p>
<button onclick="start()">PLAY NOW</button></div>
<canvas id="canvas" width="1200" height="700"></canvas>

<div class="dpad"><button class="dir" id="up">↑</button><button class="dir" id="down">↓</button>
<button class="dir" id="left">←</button><button class="dir" id="right">→</button></div>
<button class="btn" id="shoot">SHOOT</button><button class="btn" id="pass">PASS</button><button class="btn" id="sprint">SPRINT</button>

<script>
const c=document.getElementById('canvas'),x=c.getContext('2d');
let k={},game=0,ball={x:600,y:350,vx:0,vy:0},t1=[],t2=[],sc=[0,0],pow=0,me=5,clock=2700;

function teams(){t1=[];t2=[];let pos=[[80,350],[170,150],[170,280],[170,420],[170,550],[290,220],[290,350],[290,480],[410,270],[410,430],[530,350]];
pos.forEach((v,i)=>{t1.push({x:v[0],y:v[1],ox:v[0],oy:v[1],team:1,n:i+1,name:'PLAYER'});t2.push({x:1200-v[0],y:v[1],ox:1200-v[0],oy:v[1],team:2,n:i+1,name:'BOT'})})}

function drawRealPlayer(pl,isMe){
  let jersey = pl.team===1?'#0066ff':'#ff2222';
  let skin = '#f1c27d';
  
  // Shadow
  x.fillStyle='rgba(0,0,0,0.3)';x.beginPath();x.ellipse(pl.x,pl.y+18,14,5,0,0,7);x.fill();
  
  // Legs
  x.fillStyle='#222';x.fillRect(pl.x-4,pl.y+8,3,12);x.fillRect(pl.x+1,pl.y+8,3,12);
  // Boots
  x.fillStyle='#000';x.fillRect(pl.x-5,pl.y+19,5,3);x.fillRect(pl.x,pl.y+19,5,3);
  
  // Body - Jersey
  x.fillStyle=jersey;x.beginPath();x.roundRect(pl.x-9,pl.y-5,18,16,3);x.fill();
  
  // Arms
  x.fillStyle=skin;x.fillRect(pl.x-12,pl.y-2,4,10);x.fillRect(pl.x+8,pl.y-2,4,10);
  
  // Head
  x.fillStyle=skin;x.beginPath();x.arc(pl.x,pl.y-12,7,0,7);x.fill();
  
  // Number on chest
  x.fillStyle='#fff';x.font='bold 8px Arial';x.textAlign='center';x.fillText(pl.n,pl.x,pl.y+2);
  
  // Selection arrow
  if(isMe){x.fillStyle='yellow';x.beginPath();x.moveTo(pl.x,pl.y-25);x.lineTo(pl.x-5,pl.y-18);x.lineTo(pl.x+5,pl.y-18);x.fill();}
}

function draw(){
  x.clearRect(0,0,1200,700);
  [...t1,...t2].forEach((pl,i)=>drawRealPlayer(pl,(i===me)||(i===me+11)));
  // Ball
  x.fillStyle='#fff';x.beginPath();x.arc(ball.x,ball.y,7,0,7);x.fill();
  x.strokeStyle='#000';x.lineWidth=1;x.stroke();
}

function ai(){t2.forEach(pl=>{let d=Math.hypot(ball.x-pl.x,ball.y-pl.y);
if(d<220){if(pl.x<ball.x)pl.x+=2.2;if(pl.y<ball.y)pl.y+=2.2;if(pl.x>ball.x)pl.x-=2.2;if(pl.y>ball.y)pl.y-=2.2;}
else{if(Math.abs(pl.x-pl.ox)>2)pl.x+=pl.x<pl.ox?1.5:-1.5;if(Math.abs(pl.y-pl.oy)>2)pl.y+=pl.y<pl.oy?1.5:-1.5;}})}

function loop(){if(!game)return;draw();ai();
let ply=t1[me];let spd=k['Shift']||k['sprint']?7:4;
if(k['w']||k['up'])ply.y-=spd;if(k['s']||k['down'])ply.y+=spd;if(k['a']||k['left'])ply.x-=spd;if(k['d']||k['right'])ply.x+=spd;
ply.x=Math.max(20,Math.min(1180,ply.x));ply.y=Math.max(20,Math.min(680,ply.y));

ball.x+=ball.vx;ball.y+=ball.vy;ball.vx*=0.985;ball.vy*=0.985;
if(ball.x<12&&ball.y>290&&ball.y<410){sc[1]++;reset()}if(ball.x>1188&&ball.y>290&&ball.y<410){sc[0]++;reset()}
clock--;document.getElementById('hud').innerText=`${sc[0]} - ${sc[1]} | ${Math.floor(clock/60)}:${('0'+clock%60).slice(-2)}`;
requestAnimationFrame(loop)}
function reset(){ball={x:600,y:350,vx:0,vy:0};teams()}

function shoot(){let ply=t1[me];ball.x=ply.x+18;ball.y=ply.y;ball.vx=12;ball.vy=0}
function pass(){let ply=t1[me];let tar=t1.filter((_,i)=>i!==me).reduce((a,b)=>Math.hypot(a.x-ply.x,a.y-ply.y)<Math.hypot(b.x-ply.x,b.y-ply.y)?a:b);
ball.vx=(tar.x-ply.x)/12;ball.vy=(tar.y-ply.y)/12}

onkeydown=e=>{k[e.key]=1}
onkeyup=e=>{k[e.key]=0;if(e.key===' ')shoot();if(e.key==='e')pass();if(e.key==='f'){let ply=t1[me];if(Math.hypot(ball.x-ply.x,ball.y-ply.y)<22){ball.x=ply.x;ball.y=ply.y;ball.vx=ball.vy=0}}}

// MOBILE
['up','down','left','right'].forEach(id=>{document.getElementById(id).ontouchstart=()=>k[id]=1;document.getElementById(id).ontouchend=()=>k[id]=0});
document.getElementById('shoot').ontouchend=()=>shoot();
document.getElementById('pass').ontouchend=()=>pass();
document.getElementById('sprint').ontouchstart=()=>k['sprint']=1;document.getElementById('sprint').ontouchend=()=>k['sprint']=0;

function start(){game=1;teams();document.getElementById('menu').style.display='none';document.querySelectorAll('.btn,.dpad.dir').forEach(b=>b.style.display='block');loop()}
</script>
</body>
</html>
